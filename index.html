<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schimudt</title>
  <style>
    :root {
      --overlay-color: #b20000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: -2rem;
      z-index: -2;
    }

    .hero::before {
      background:
        url("./assets/max-duzij-NhG05ImWSIo-unsplash.jpeg") center center / cover no-repeat;
      filter: grayscale(1) blur(18px);
      transform: scale(1.08);
    }

    .hero::after {
      inset: 0;
      z-index: -1;
      background: var(--overlay-color);
      mix-blend-mode: multiply;
      opacity: 0.92;
    }

    .logo {
      width: min(62vw, 420px);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.28));
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Landing page">
    <img class="logo" src="./assets/logo.svg" alt="Schimudt logo">
  </main>
</body>
</html>
